<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern 2-Bed House Near Old Town, Koh Lanta - 1,950,000 THB</title>
    <meta name="description" content="Architect-styled 2-bed house near Old Town, Koh Lanta. 100 m², Chanote title, built 2016. Vaulted ceilings, microcement bathrooms, butterfly roof. Sold as-is - interior move-in ready. 1,950,000 THB.">

    <!-- Open Graph -->
    <meta property="og:title" content="Modern 2-Bed House Near Old Town, Koh Lanta - 1,950,000 THB">
    <meta property="og:description" content="Architect-styled 2-bed house near Old Town, Koh Lanta. 100 m², Chanote title, built 2016. Vaulted ceilings, microcement bathrooms, butterfly roof. Sold as-is - interior move-in ready.">
    <meta property="og:image" content="https://lanta.homes/ot265/hero-web-mobile.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="800">
    <meta property="og:url" content="https://lanta.homes/ot265/">
    <meta property="og:type" content="website">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Modern 2-Bed House Near Old Town, Koh Lanta - 1,950,000 THB">
    <meta name="twitter:description" content="Architect-styled 2-bed house near Old Town, Koh Lanta. 100 m², Chanote title, built 2016. Sold as-is - interior move-in ready.">
    <meta name="twitter:image" content="https://lanta.homes/ot265/hero-web-mobile.jpg">

    <!-- Preload the LCP hero (responsive: lighter image on mobile) -->
    <link rel="preload" as="image" href="hero-web-mobile.jpg" media="(max-width: 1023px)" fetchpriority="high">
    <link rel="preload" as="image" href="hero-web.jpg" media="(min-width: 1024px)" fetchpriority="high">

    <!-- Self-hosted fonts (Inter + Playfair Display) -->
    <link rel="stylesheet" href="css/fonts.css?v=2">

    <!-- Favicons (relative paths — listing is served under /ot265/) -->
    <link rel="icon" type="image/png" href="favicon-96x96.png?v=20260522" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=20260522" />
    <link rel="shortcut icon" href="favicon.ico?v=20260522" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=20260522" />
    <link rel="manifest" href="site.webmanifest?v=20260522" />

    <!-- Compiled Tailwind (recompile: npx tailwindcss@3 -i tailwind-input.css -o ot265/css/tailwind.css --minify) -->
    <link rel="stylesheet" href="css/tailwind.css?v=1">

    <!-- Keen Slider CSS (self-hosted) -->
    <link rel="stylesheet" href="css/keen-slider.min.css?v=6">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css?v=6">
</head>
<body class="bg-earth-bg text-earth-text font-body" x-data>

    <!-- Language Toggle (visible only while hero is in viewport) -->
    <div class="fixed top-4 right-4 z-50"
         x-data="langToggle"
         x-show="visible"
         x-transition.opacity>
        <button
            @click="$store.lang.toggle()"
            class="w-8 h-8 rounded-full shadow-lg ring-2 ring-white/80 overflow-hidden hover:scale-105 transition-transform cursor-pointer flex items-center justify-center"
            :aria-label="$store.lang.current === 'en' ? 'Switch to Thai' : 'Switch to English'"
        >
            <img x-show="$store.lang.current === 'en'" src="images/thai.svg" alt="" class="w-full h-full object-cover">
            <img x-show="$store.lang.current === 'th'" src="images/english.svg" alt="" class="w-full h-full object-cover">
        </button>
    </div>

    <!-- Hero Section -->
    <section data-hero class="lg:relative w-full aspect-[4/3] lg:aspect-auto lg:h-screen flex items-center justify-center" style="background-size:cover;background-position:center;background-color:#8B7355;">
        <div class="hero-overlay absolute inset-0"></div>

        <!-- Desktop text overlay (hidden on mobile) -->
        <div class="relative z-10 text-center text-white px-4 hidden lg:block">
            <h1 class="font-heading text-5xl md:text-7xl font-bold mb-4 drop-shadow-lg"
                x-text="$store.lang.t('hero_title')"></h1>
            <p class="text-lg md:text-2xl font-light tracking-wide drop-shadow-md mb-6"
               x-text="$store.lang.t('hero_tagline')"></p>
            <span class="inline-block bg-earth-accent text-white px-5 py-2.5 rounded-full font-semibold text-lg drop-shadow"
                  x-text="$store.lang.t('pill_price')"></span>
        </div>

        <!-- Scroll Indicator (desktop only) -->
        <a href="#overview" class="absolute bottom-8 left-1/2 -translate-x-1/2 scroll-indicator text-white/80 hover:text-white transition-colors hidden lg:flex">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
            </svg>
        </a>
    </section>

    <!-- Everything below the hero scrolls up over the pinned mobile hero -->
    <div class="content-over-hero">

    <!-- Mobile info bar (sticky below hero, hidden on lg+) -->
    <div class="lg:hidden sticky top-0 z-40 bg-white border-b border-earth-pill shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-2">
            <p class="font-heading text-lg font-semibold text-earth-text leading-tight"
               x-text="$store.lang.t('hero_mobile_title')"></p>
            <div class="flex items-center justify-between gap-3">
                <span class="text-sm text-earth-secondary"
                      x-text="$store.lang.t('hero_mobile_location')"></span>
                <span class="bg-earth-accent text-white text-xs font-semibold px-3 py-1 rounded-full whitespace-nowrap"
                      x-text="$store.lang.t('pill_price')"></span>
            </div>
        </div>
    </div>

    <!-- Overview + Gallery (combined; DOM order controls mobile stacking) -->
    <section class="pt-16 md:pt-24 pb-16 md:pb-24">
        <div class="max-w-6xl mx-auto px-4">
            <div class="lg:grid lg:grid-cols-3 lg:items-start">

                <!-- TEXT — DOM order 1; desktop: col 1-2, row 1 -->
                <div id="overview" class="lg:col-span-2 lg:row-start-1 lg:pr-16 pb-10 lg:pb-0"
                     x-data="scrollReveal" :class="revealed ? 'reveal-visible' : 'reveal-hidden'">
                    <h2 class="font-heading text-3xl md:text-4xl mb-8"
                        x-text="$store.lang.t('overview_title')"></h2>
                    <div class="space-y-4 text-earth-secondary leading-relaxed text-lg">
                        <p x-text="$store.lang.t('overview_p1')"></p>
                        <p x-text="$store.lang.t('overview_p2')"></p>
                        <p x-text="$store.lang.t('overview_p3')"></p>
                    </div>
                </div>

                <!-- GALLERY — DOM order 2; desktop: col 1-3, row 2 (below both columns) -->
                <!-- scrollReveal must stay OUTSIDE the gallery component: x-ref="mainSlider"/"thumbSlider"
                     have to sit under the gallery root with no intervening x-data, or $refs won't resolve
                     in buildSliders() and the slider builds nothing. -->
                <div class="lg:col-span-3 lg:row-start-2 -mx-4 lg:mx-0 mt-10 lg:mt-16"
                     x-data="scrollReveal"
                     :class="revealed ? 'reveal-visible' : 'reveal-hidden'">
                  <div x-data="gallery">
                    <div class="bg-white py-12 lg:py-16 px-4 lg:px-6 lg:rounded-2xl">
                        <h2 class="font-heading text-3xl md:text-4xl text-center mb-8"
                            x-text="$store.lang.t('gallery_title')"></h2>

                        <!-- Category Tabs -->
                        <div class="flex justify-center gap-2 mb-8">
                            <button @click="setCategory('exterior')"
                                    :class="activeCategory === 'exterior' ? 'bg-earth-accent text-white' : 'bg-earth-pill text-earth-pill-text hover:bg-earth-accent/20'"
                                    class="px-5 py-2 rounded-full text-sm font-medium transition-colors cursor-pointer"
                                    x-text="$store.lang.t('gallery_exterior')"></button>
                            <button @click="setCategory('interior')"
                                    :class="activeCategory === 'interior' ? 'bg-earth-accent text-white' : 'bg-earth-pill text-earth-pill-text hover:bg-earth-accent/20'"
                                    class="px-5 py-2 rounded-full text-sm font-medium transition-colors cursor-pointer"
                                    x-text="$store.lang.t('gallery_interior')"></button>
                            <button @click="setCategory('surroundings')"
                                    :class="activeCategory === 'surroundings' ? 'bg-earth-accent text-white' : 'bg-earth-pill text-earth-pill-text hover:bg-earth-accent/20'"
                                    class="px-5 py-2 rounded-full text-sm font-medium transition-colors cursor-pointer"
                                    x-text="$store.lang.t('gallery_surroundings')"></button>
                        </div>

                        <!-- Main Slider -->
                        <div class="relative mb-4">
                            <div x-ref="mainSlider" class="keen-slider gallery-slider"></div>
                            <button @click="mainSlider?.prev()"
                                    class="absolute left-3 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white rounded-full p-2 shadow-lg transition-all hidden md:block cursor-pointer">
                                <svg class="w-5 h-5 text-earth-text" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                                </svg>
                            </button>
                            <button @click="mainSlider?.next()"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white rounded-full p-2 shadow-lg transition-all hidden md:block cursor-pointer">
                                <svg class="w-5 h-5 text-earth-text" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                                </svg>
                            </button>
                        </div>

                        <!-- Thumbnail Strip -->
                        <div x-ref="thumbSlider" class="keen-slider thumb-slider"></div>
                    </div>

                    <!-- Lightbox: scrollable column of all images with section headers.
                         Teleported to <body> so position:fixed anchors to the viewport — the
                         scrollReveal wrapper's lingering transform (fade-in-up ends at translateY(0),
                         not none) would otherwise become its containing block and trap it in the grid. -->
                    <template x-teleport="body">
                    <div x-show="lightboxOpen" x-transition.opacity
                         class="fixed inset-0 z-50 bg-black/95 overflow-y-auto"
                         @keydown.escape.window="if (lightboxOpen) closeLightbox()">

                        <!-- Sticky close bar -->
                        <div class="sticky top-0 z-10 flex justify-end px-4 py-3 bg-gradient-to-b from-black to-transparent pointer-events-none">
                            <button @click="closeLightbox()"
                                    class="pointer-events-auto text-white hover:text-earth-accent transition-colors cursor-pointer">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>

                        <!-- Images column -->
                        <div class="max-w-3xl mx-auto px-4 pb-16 -mt-14">
                            <template x-for="(item, i) in lightboxItems" :key="i">
                                <div>
                                    <template x-if="item.type === 'header'">
                                        <div class="text-white/50 text-xs font-medium uppercase tracking-widest mt-10 mb-4 pb-2 border-b border-white/10"
                                             x-text="item.title"></div>
                                    </template>
                                    <template x-if="item.type === 'image'">
                                        <div class="mb-3" :data-lb-idx="item.flatIdx">
                                            <img :src="item.src" :alt="item.alt"
                                                 class="w-full rounded-lg"
                                                 loading="lazy"
                                                 onerror="this.style.display='none'">
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                    </template>
                  </div>
                </div>

                <!-- INFO CARD — DOM order 3; desktop: col 3, row 1 (sticky alongside text) -->
                <div class="lg:col-start-3 lg:row-start-1 mt-10 lg:mt-0"
                     x-data="scrollReveal(150)"
                     :class="revealed ? 'reveal-visible' : 'reveal-hidden'">
                    <div class="bg-white rounded-2xl shadow-md border border-earth-pill overflow-hidden">

                        <!-- Price header -->
                        <div class="bg-earth-accent px-6 py-5 text-white text-center">
                            <p class="text-xs font-medium uppercase tracking-wider opacity-80 mb-1"
                               x-text="$store.lang.t('info_asking_price')"></p>
                            <p class="font-heading text-3xl font-bold"
                               x-text="$store.lang.t('pill_price')"></p>
                        </div>

                        <!-- Specs list -->
                        <div class="px-6 py-5 space-y-3.5">
                            <div class="flex items-center gap-3 text-lg">
                                <svg class="w-4 h-4 text-earth-accent flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 22V10l9-8 9 8v12"/><path d="M9 22v-6h6v6"/>
                                </svg>
                                <span class="text-earth-secondary" x-text="$store.lang.t('pill_bedrooms')"></span>
                            </div>
                            <div class="flex items-center gap-3 text-lg">
                                <svg class="w-4 h-4 text-earth-accent flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 12h16a1 1 0 011 1v3a4 4 0 01-4 4H7a4 4 0 01-4-4v-3a1 1 0 011-1z"/><path d="M6 12V5a2 2 0 012-2h3v2.25"/><path d="M4 22v-2"/><path d="M20 22v-2"/>
                                </svg>
                                <span class="text-earth-secondary" x-text="$store.lang.t('pill_bathrooms')"></span>
                            </div>
                            <div class="flex items-center gap-3 text-lg">
                                <svg class="w-4 h-4 text-earth-accent flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
                                </svg>
                                <span class="text-earth-secondary" x-text="$store.lang.t('pill_living')"></span>
                            </div>
                            <div class="flex items-center gap-3 text-lg">
                                <svg class="w-4 h-4 text-earth-accent flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/>
                                </svg>
                                <span class="text-earth-secondary" x-text="$store.lang.t('pill_land')"></span>
                            </div>
                            <div class="flex items-center gap-3 text-lg">
                                <svg class="w-4 h-4 text-earth-accent flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
                                </svg>
                                <span class="text-earth-secondary" x-text="$store.lang.t('pill_year')"></span>
                            </div>
                            <div class="flex items-center gap-3 text-lg">
                                <svg class="w-4 h-4 text-earth-accent flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7L12 2z"/><path d="M9 12l2 2 4-4"/>
                                </svg>
                                <span class="text-earth-secondary" x-text="$store.lang.t('pill_ownership')"></span>
                            </div>
                        </div>

                        <!-- CTA button -->
                        <div class="px-6 pb-6">
                            <a href="#contact"
                               class="block text-center bg-earth-accent text-white py-3 rounded-xl font-medium hover:bg-earth-secondary transition-colors">
                                <span x-text="$store.lang.t('overview_cta')"></span>
                            </a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Drone Video -->
    <section class="py-16 md:py-24"
             x-data="scrollReveal"
             :class="revealed ? 'reveal-visible' : 'reveal-hidden'">
        <div class="max-w-6xl mx-auto px-4">
            <h2 class="font-heading text-3xl md:text-4xl text-center mb-3"
                x-text="$store.lang.t('video_title')"></h2>
            <p class="text-center text-earth-secondary mb-8"
               x-text="$store.lang.t('video_subtitle')"></p>
        </div>

        <div class="relative max-w-6xl mx-auto px-4" x-data="droneVideo">
            <div class="video-container relative rounded-xl overflow-hidden shadow-lg">
                <div class="video-placeholder w-full flex items-center justify-center">
                    <video x-ref="video"
                           class="absolute inset-0 w-full h-full object-cover"
                           playsinline muted loop
                           data-src="oldtown-house-720p.mp4">
                    </video>

                    <span x-show="!loaded" class="text-white/60 text-lg z-10">Video placeholder</span>
                </div>

                <div class="absolute bottom-4 right-4 flex gap-2 z-10">
                    <button @click="togglePlay()"
                            class="bg-white/80 hover:bg-white rounded-full p-3 shadow-lg transition-all cursor-pointer">
                        <svg x-show="!playing" class="w-5 h-5 text-earth-text" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg x-show="playing" class="w-5 h-5 text-earth-text" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Property Details -->
    <section class="py-16 md:py-24 bg-white"
             x-data="scrollReveal" :class="revealed ? 'reveal-visible' : 'reveal-hidden'">
        <div class="max-w-5xl mx-auto px-4">
            <h2 class="font-heading text-3xl md:text-4xl text-center mb-12"
                x-text="$store.lang.t('details_title')"></h2>

            <!-- 2 equal info cards -->
            <div class="grid md:grid-cols-2 gap-6 mb-6">

                <!-- Location -->
                <div class="p-6 rounded-xl bg-earth-bg border-t-2 border-earth-accent">
                    <div class="flex items-center gap-2.5 mb-3">
                        <svg class="w-5 h-5 text-earth-accent flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        <h3 class="font-heading text-lg font-semibold"
                            x-text="$store.lang.t('details_location_title')"></h3>
                    </div>
                    <p class="text-earth-secondary leading-relaxed text-base"
                       x-text="$store.lang.t('details_location_text')"></p>
                </div>

                <!-- Condition -->
                <div class="p-6 rounded-xl bg-earth-bg border-t-2 border-earth-accent">
                    <div class="flex items-center gap-2.5 mb-3">
                        <svg class="w-5 h-5 text-earth-accent flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <h3 class="font-heading text-lg font-semibold"
                            x-text="$store.lang.t('details_condition_title')"></h3>
                    </div>
                    <p class="text-earth-secondary leading-relaxed text-base"
                       x-text="$store.lang.t('details_condition_text')"></p>
                </div>

            </div>

            <!-- Price — full-width highlight strip -->
            <div class="p-6 md:p-8 rounded-xl bg-earth-accent/10 border border-earth-accent/25">
                <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-6">
                    <div class="flex-1">
                        <div class="flex items-center gap-2.5 mb-3">
                            <svg class="w-5 h-5 text-earth-accent flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <h3 class="font-heading text-xl font-semibold"
                                x-text="$store.lang.t('details_price_title')"></h3>
                        </div>
                        <p class="text-earth-secondary leading-relaxed text-base"
                           x-text="$store.lang.t('details_price_text')"></p>
                    </div>
                    <a href="#contact"
                       class="flex-shrink-0 self-start bg-earth-accent text-white px-6 py-3 rounded-xl font-medium hover:bg-earth-secondary transition-colors whitespace-nowrap">
                        <span x-text="$store.lang.t('overview_cta')"></span>
                    </a>
                </div>
            </div>

        </div>
    </section>

    <!-- Location Map -->
    <section class="py-16 md:py-24"
             x-data="scrollReveal"
             :class="revealed ? 'reveal-visible' : 'reveal-hidden'">
        <div class="max-w-5xl mx-auto px-4">
            <h2 class="font-heading text-3xl md:text-4xl text-center mb-8"
                x-text="$store.lang.t('map_title')"></h2>

            <div class="rounded-xl overflow-hidden shadow-lg">
                <iframe
                    src="https://maps.google.com/maps?q=7.5231663,99.0960800&z=14&output=embed"
                    width="100%"
                    height="400"
                    style="border:0;"
                    allowfullscreen=""
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"
                    title="Baan Sawan location on map"
                ></iframe>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <div x-data="scrollReveal" :class="revealed ? 'reveal-visible' : 'reveal-hidden'">
    <section id="contact" class="py-16 md:py-24 bg-white" x-data="contactForm">
        <div class="max-w-5xl mx-auto px-4">
            <h2 class="font-heading text-3xl md:text-4xl text-center mb-3"
                x-text="$store.lang.t('contact_title')"></h2>
            <p class="text-center text-earth-secondary mb-12"
               x-text="$store.lang.t('contact_subtitle')"></p>

            <div class="grid md:grid-cols-2 gap-12">
                <!-- Form -->
                <form @submit.prevent="submit()" class="space-y-4">
                    <!-- Honeypot (hidden from humans) -->
                    <input type="text" name="website" x-model="honeypot"
                           class="!absolute !-top-full !-left-full !w-0 !h-0 !opacity-0"
                           tabindex="-1" autocomplete="off" aria-hidden="true">

                    <div>
                        <input type="text" x-model="name" required
                               :placeholder="$store.lang.t('contact_name')"
                               class="w-full px-4 py-3 rounded-lg border border-earth-pill bg-earth-bg focus:outline-none focus:ring-2 focus:ring-earth-accent/50 transition-all"
                               @focus="resetState()">
                    </div>
                    <div>
                        <input type="email" x-model="email" required
                               :placeholder="$store.lang.t('contact_email')"
                               class="w-full px-4 py-3 rounded-lg border border-earth-pill bg-earth-bg focus:outline-none focus:ring-2 focus:ring-earth-accent/50 transition-all"
                               @focus="resetState()">
                    </div>
                    <div>
                        <input type="tel" x-model="phone"
                               :placeholder="$store.lang.t('contact_phone')"
                               class="w-full px-4 py-3 rounded-lg border border-earth-pill bg-earth-bg focus:outline-none focus:ring-2 focus:ring-earth-accent/50 transition-all"
                               @focus="resetState()">
                    </div>
                    <div>
                        <textarea x-model="message" rows="4"
                                  :placeholder="$store.lang.t('contact_message')"
                                  class="w-full px-4 py-3 rounded-lg border border-earth-pill bg-earth-bg focus:outline-none focus:ring-2 focus:ring-earth-accent/50 transition-all resize-none"
                                  @focus="resetState()"></textarea>
                    </div>

                    <button type="submit" :disabled="state === 'sending'"
                            class="w-full bg-earth-accent text-white py-3 rounded-lg font-medium hover:bg-earth-secondary transition-colors disabled:opacity-50 cursor-pointer">
                        <span x-text="state === 'sending' ? $store.lang.t('contact_sending') : $store.lang.t('contact_send')"></span>
                    </button>

                    <!-- Success -->
                    <div x-show="state === 'success'" x-transition
                         class="p-4 bg-green-50 text-green-700 rounded-lg text-sm"
                         x-text="$store.lang.t('contact_success')"></div>

                    <!-- Error -->
                    <div x-show="state === 'error'" x-transition
                         class="p-4 bg-red-50 text-red-700 rounded-lg text-sm"
                         x-text="$store.lang.t('contact_error')"></div>
                </form>

                <!-- Contact Info & Messaging Buttons -->

                        <div class="text-left">
                            <p class="text-earth-secondary text-sm mb-0.5"
                               x-text="$store.lang.t('contact_agent')"></p>
                            <p class="font-heading text-xl font-semibold"
                               x-text="$store.lang.t('contact_agent_name')"></p>
                        </div>
                    </div>

                        </svg>
                        <span x-text="$store.lang.t('contact_whatsapp')"></span>
                    </a>

                       class="flex items-center justify-center gap-3 bg-[#06C755] text-white py-4 rounded-lg font-medium hover:opacity-90 transition-opacity">
