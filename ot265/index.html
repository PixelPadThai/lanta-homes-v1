<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern 2-Bed House Near Old Town, Koh Lanta - 1,950,000 THB</title>
    <meta name="description" content="Architect-styled 2-bed house near Old Town, Koh Lanta. 100 m², Chanote title, built 2016. Vaulted ceilings, microcement bathrooms, butterfly roof. Sold as-is - interior move-in ready. 1,950,000 THB.">

    <!-- Open Graph -->
    <meta property="og:title" content="Modern 2-Bed House Near Old Town, Koh Lanta - 1,950,000 THB">
    <meta property="og:description" content="Architect-styled 2-bed house near Old Town, Koh Lanta. 100 m², Chanote title, built 2016. Vaulted ceilings, microcement bathrooms, butterfly roof. Sold as-is - interior move-in ready.">
    <meta property="og:image" content="https://lanta.homes/ot265/hero-web.jpg">
    <meta property="og:image:secure_url" content="https://lanta.homes/ot265/hero-web.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1400">
    <meta property="og:image:height" content="933">
    <meta property="og:image:alt" content="Modern 2-bed house near Old Town, Koh Lanta">
    <meta property="og:url" content="https://lanta.homes/ot265/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="lanta.homes">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Modern 2-Bed House Near Old Town, Koh Lanta - 1,950,000 THB">
    <meta name="twitter:description" content="Architect-styled 2-bed house near Old Town, Koh Lanta. 100 m², Chanote title, built 2016. Sold as-is - interior move-in ready.">
    <meta name="twitter:image" content="https://lanta.homes/ot265/hero-web.jpg">

    <!-- Preload the LCP hero (slide 1 of the hero slider — responsive). -->
    <link rel="preload" as="image" href="gallery-images/oldtown-2bed-house-1-front-1-mobile.jpg" media="(max-width: 1023px)" fetchpriority="high">
    <link rel="preload" as="image" href="gallery-images/oldtown-2bed-house-1-front-1-web.jpg"    media="(min-width: 1024px)" fetchpriority="high">

    <!-- Favicons (relative paths — listing is served under /ot265/) -->
    <link rel="icon" type="image/png" href="favicon-96x96.png?v=20260522" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=20260522" />
    <link rel="shortcut icon" href="favicon.ico?v=20260522" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=20260522" />
    <link rel="manifest" href="site.webmanifest?v=20260522" />

    <!-- Bundled stylesheet: tailwind + keen-slider + fonts + custom (see ot265/css/site.css header for rebuild). -->
    <link rel="stylesheet" href="css/site.css?v=21">
</head>
<body class="bg-earth-bg text-earth-text font-body" x-data>

    <!-- Open Gallery button (mirrors the lang toggle's scroll-fade) -->
    <div class="fixed z-50 top-4 left-4"
         x-data="langToggle"
         x-show="visible"
         x-transition.opacity>
        <button
            @click="window.dispatchEvent(new CustomEvent('open-gallery-lightbox'))"
            :aria-label="$store.lang.t('open_gallery')"
            class="flex items-center gap-2 p-1 md:pl-1.5 md:pr-4 bg-white/95 rounded-full shadow-lg ring-2 ring-white/80 hover:scale-105 transition-transform cursor-pointer text-earth-text">
            <svg class="w-8 h-8 text-earth-accent" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <span class="hidden md:inline text-sm font-medium whitespace-nowrap" x-text="$store.lang.t('open_gallery')"></span>
        </button>
    </div>

    <!-- Language Toggle (visible only while hero is in viewport) -->
    <!-- Shows 2 flag buttons — one for each language that is NOT currently active. -->
    <div class="fixed z-50 top-4 right-4 flex gap-2"
         x-data="langToggle"
         x-show="visible"
         x-transition.opacity>
        <button
            x-show="$store.lang.current !== 'en'"
            @click="$store.lang.setLang('en')"
            class="flex items-center justify-center w-8 h-8 overflow-hidden transition-transform rounded-full shadow-lg cursor-pointer ring-2 ring-white/80 hover:scale-105"
            aria-label="Switch to English"
        >
            <img src="images/english.svg" alt="English" class="object-cover w-full h-full">
        </button>
        <button
            x-show="$store.lang.current !== 'th'"
            @click="$store.lang.setLang('th')"
            class="flex items-center justify-center w-8 h-8 overflow-hidden transition-transform rounded-full shadow-lg cursor-pointer ring-2 ring-white/80 hover:scale-105"
            aria-label="Switch to Thai"
        >
            <img src="images/thai.svg" alt="Thai" class="object-cover w-full h-full">
        </button>
        <button
            x-show="$store.lang.current !== 'sv'"
            @click="$store.lang.setLang('sv')"
            class="flex items-center justify-center w-8 h-8 overflow-hidden transition-transform rounded-full shadow-lg cursor-pointer ring-2 ring-white/80 hover:scale-105"
            aria-label="Switch to Swedish"
        >
            <img src="images/swedish.svg" alt="Swedish" class="object-cover w-full h-full">
        </button>
    </div>

    <!-- Hero Section — Keen Slider with mouse/touch drag. Slide 1 is
         the LCP (eager + preloaded); slides 2 & 3 swap data-src → src
         after window.load so they never compete with critical assets.
         Layout: section is the positioned root; the slider and the
         centered-text overlay are independent absolute layers, so
         neither can push the other off-center. -->
    <section data-hero
             x-data="heroSlider"
             class="lg:relative w-full aspect-[4/3] lg:aspect-auto lg:h-screen overflow-hidden"
             style="background-color:#8B7355;">

        <!-- Slider fills the hero -->
        <div x-ref="slider" class="hero-keen-slider keen-slider absolute inset-0 w-full h-full">
            <div class="keen-slider__slide">
                <img src="gallery-images/oldtown-2bed-house-1-front-1-web.jpg"
                     srcset="gallery-images/oldtown-2bed-house-1-front-1-mobile.jpg 700w,
                             gallery-images/oldtown-2bed-house-1-front-1-web.jpg 1200w"
                     sizes="100vw"
                     fetchpriority="high"
                     draggable="false"
                     alt="">
            </div>
            <div class="keen-slider__slide">
                <img data-src="gallery-images/oldtown-2bed-house-13-aerial-photo-1-web.jpg"
                     data-srcset="gallery-images/oldtown-2bed-house-13-aerial-photo-1-mobile.jpg 700w, gallery-images/oldtown-2bed-house-13-aerial-photo-1-web.jpg 1200w"
                     data-sizes="100vw"
                     draggable="false"
                     alt="">
            </div>
            <div class="keen-slider__slide">
                <img data-src="gallery-images/oldtown-2bed-house-1-front-2-web.jpg"
                     data-srcset="gallery-images/oldtown-2bed-house-1-front-2-mobile.jpg 700w, gallery-images/oldtown-2bed-house-1-front-2-web.jpg 1200w"
                     data-sizes="100vw"
                     draggable="false"
                     alt="">
            </div>
        </div>

        <!-- Centered text overlay layer (desktop only). Absolute inset:0
             + flex centering guarantees the text sits in the middle of
             the hero regardless of the slider's layout. -->
        <div class="absolute inset-0 z-10 hidden lg:flex items-center justify-center pointer-events-none">
            <div class="px-4 text-center hero-overlay"
                 :class="{ 'hero-overlay-fading': transitioning }">
                <h1 class="mb-4 text-5xl font-bold font-heading md:text-7xl hero-text"
                    x-text="$store.lang.t(slides[activeIdx].titleKey)"></h1>
                <p class="mb-6 text-lg font-light tracking-wide md:text-2xl hero-text-soft"
                   x-text="$store.lang.t(slides[activeIdx].tagKey)"></p>
                <div class="flex flex-wrap items-center justify-center gap-3">
                    <span class="bg-earth-accent text-white px-5 py-2.5 rounded-full font-semibold text-lg pill"
                          x-text="$store.lang.t('pill_price')"></span>
                    <button x-show="activeIdx > 0"
                            @click="window.dispatchEvent(new CustomEvent('open-gallery-lightbox'))"
                            :aria-label="$store.lang.t('open_gallery')"
                            class="inline-flex items-center gap-2 bg-white/95 text-earth-text hover:bg-white px-5 py-2.5 rounded-full font-semibold text-lg pill cursor-pointer pointer-events-auto transition-colors">
                        <svg class="w-5 h-5 text-earth-accent" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                        <span x-text="$store.lang.t('open_gallery')"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Scroll Indicator (desktop only) -->
        <a href="#overview"
           :aria-label="$store.lang.t('a11y_scroll_down')"
           class="absolute z-10 hidden transition-colors -translate-x-1/2 bottom-8 left-1/2 scroll-indicator text-white/80 hover:text-white lg:flex">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
            </svg>
        </a>
    </section>

    <!-- Everything below the hero scrolls up over the pinned mobile hero -->
    <div class="content-over-hero">

    <!-- Mobile info bar (sticky below hero, hidden on lg+) -->
    <div class="sticky top-0 z-40 bg-white border-b shadow-sm lg:hidden border-earth-pill">
        <div class="flex items-center justify-between gap-3 max-w-6xl px-3 py-2 mx-auto">
            <div class="min-w-0">
                <p class="text-lg font-semibold leading-tight font-heading text-earth-text"
                   x-text="$store.lang.t('hero_mobile_title')"></p>
                <span class="text-sm text-earth-secondary"
                      x-text="$store.lang.t('hero_mobile_location')"></span>
            </div>
            <span class="px-3 py-1 text-xs font-semibold text-white rounded-full bg-earth-accent whitespace-nowrap pill"
                  x-data="{
                      idx: 0,
                      fading: false,
                      items: [
                          { flag: 'thai.svg', key: 'pill_price' },
                          { flag: 'usa.svg',  key: 'info_price_usd' },
                          { flag: 'euro.svg', key: 'info_price_eur' }
                      ],
                      init() {
                          setInterval(() => {
                              this.fading = true;
                              setTimeout(() => {
                                  this.idx = (this.idx + 1) % this.items.length;
                                  this.fading = false;
                              }, 250);
                          }, 3000);
                      }
                  }">
                <span class="inline-flex items-center gap-1.5 pill-cycle"
                      :class="{ 'pill-cycle--fading': fading }">
                    <img :src="`images/${items[idx].flag}`" alt="" class="w-3.5 h-3.5 rounded-full object-cover">
                    <span x-text="$store.lang.t(items[idx].key)"></span>
                </span>
            </span>
        </div>
    </div>

    <!-- Overview + Gallery (combined; DOM order controls mobile stacking) -->
    <section class="pt-16 pb-16 md:pt-24 md:pb-24">
        <div class="max-w-6xl px-3 mx-auto">
            <div class="lg:grid lg:grid-cols-3 lg:items-start">

                <!-- TEXT — DOM order 1; desktop: col 1-2, row 1 -->
                <div id="overview" class="pb-10 lg:col-span-2 lg:row-start-1 lg:pr-16 lg:pb-0"
                     x-data="scrollReveal" :class="revealed ? 'reveal-visible' : 'reveal-hidden'">
                    <h2 class="mb-8 text-3xl font-heading md:text-4xl"
                        x-text="$store.lang.t('overview_title')"></h2>
                    <div x-data="{ expanded: false }">
                        <div class="overview-collapsible space-y-4 text-lg leading-relaxed text-earth-secondary"
                             :class="{ 'is-expanded': expanded }">
                            <p x-text="$store.lang.t('overview_p1')"></p>
                            <p x-text="$store.lang.t('overview_p2')"></p>
                            <p x-text="$store.lang.t('overview_year_round')"></p>
                            <p x-text="$store.lang.t('overview_p3')"></p>
                        </div>
                        <button @click="expanded = !expanded"
                                :aria-expanded="expanded"
                                class="overview-toggle lg:hidden">
                            <svg x-show="!expanded" class="overview-toggle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            <svg x-show="expanded" class="overview-toggle__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            <span x-text="expanded ? $store.lang.t('overview_read_less') : $store.lang.t('overview_read_more')"></span>
                        </button>
                    </div>
                </div>

                <!-- GALLERY — DOM order 2; desktop: col 1-3, row 2 (below both columns) -->
                <!-- scrollReveal must stay OUTSIDE the gallery component: x-ref="mainSlider"/"thumbSlider"
                     have to sit under the gallery root with no intervening x-data, or $refs won't resolve
                     in buildSliders() and the slider builds nothing. -->
                <div class="mt-10 gallery-breakout-x lg:col-span-3 lg:row-start-2 lg:mt-16"
                     x-data="scrollReveal"
                     :class="revealed ? 'reveal-visible' : 'reveal-hidden'">
                  <div x-data="gallery">
                    <div class="px-4 py-12 bg-white lg:py-16 lg:px-6 lg:rounded-2xl">
                        <h2 class="mb-8 text-3xl text-center font-heading md:text-4xl"
                            x-text="$store.lang.t('gallery_title')"></h2>

                        <!-- Category Tabs -->
                        <div class="flex justify-center gap-2 mb-8">
                            <button @click="setCategory('exterior')"
                                    :class="activeCategory === 'exterior' ? 'bg-earth-accent text-white' : 'bg-earth-pill text-earth-pill-text hover:bg-earth-accent/20'"
                                    class="px-5 py-2 text-sm font-medium transition-colors rounded-full cursor-pointer pill"
                                    x-text="$store.lang.t('gallery_exterior')"></button>
                            <button @click="setCategory('interior')"
                                    :class="activeCategory === 'interior' ? 'bg-earth-accent text-white' : 'bg-earth-pill text-earth-pill-text hover:bg-earth-accent/20'"
                                    class="px-5 py-2 text-sm font-medium transition-colors rounded-full cursor-pointer pill"
                                    x-text="$store.lang.t('gallery_interior')"></button>
                            <button @click="setCategory('surroundings')"
                                    :class="activeCategory === 'surroundings' ? 'bg-earth-accent text-white' : 'bg-earth-pill text-earth-pill-text hover:bg-earth-accent/20'"
                                    class="px-5 py-2 text-sm font-medium transition-colors rounded-full cursor-pointer pill"
                                    x-text="$store.lang.t('gallery_surroundings')"></button>
                            <button @click="openLightbox()"
                                    :aria-label="$store.lang.t('open_gallery')"
                                    class="hidden md:flex items-center gap-1.5 px-5 py-2 text-sm font-medium transition-colors rounded-full cursor-pointer pill bg-earth-pill text-earth-pill-text hover:bg-earth-accent/20">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                                <span x-text="$store.lang.t('open_gallery')"></span>
                            </button>
                        </div>

                        <!-- Main Slider -->
                        <div class="relative mb-4">
                            <div x-ref="mainSlider" class="keen-slider gallery-slider"></div>
                            <button @click="mainSlider?.prev()"
                                    :aria-label="$store.lang.t('a11y_prev_image')"
                                    class="absolute hidden p-2 transition-all -translate-y-1/2 rounded-full shadow-lg cursor-pointer left-3 top-1/2 bg-white/80 hover:bg-white md:block">
                                <svg class="w-5 h-5 text-earth-text" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                                </svg>
                            </button>
                            <button @click="mainSlider?.next()"
                                    :aria-label="$store.lang.t('a11y_next_image')"
                                    class="absolute hidden p-2 transition-all -translate-y-1/2 rounded-full shadow-lg cursor-pointer right-3 top-1/2 bg-white/80 hover:bg-white md:block">
                                <svg class="w-5 h-5 text-earth-text" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                                </svg>
                            </button>
                        </div>

                        <!-- Thumbnail Strip -->
                        <div x-ref="thumbSlider" class="keen-slider thumb-slider"></div>

                        <!-- Open Gallery (mobile only; desktop version sits in the tab row) -->
                        <div class="flex justify-center mt-10 md:hidden">
                            <button @click="openLightbox()"
                                    :aria-label="$store.lang.t('open_gallery')"
                                    class="flex items-center gap-1.5 px-5 py-2 text-sm font-medium transition-colors rounded-full cursor-pointer pill bg-earth-pill text-earth-pill-text hover:bg-earth-accent/20">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                                <span x-text="$store.lang.t('open_gallery')"></span>
                            </button>
                        </div>
                    </div>

                    <!-- Lightbox: scrollable column of all images with section headers.
                         Teleported to <body> so position:fixed anchors to the viewport — the
                         scrollReveal wrapper's lingering transform (fade-in-up ends at translateY(0),
                         not none) would otherwise become its containing block and trap it in the grid. -->
                    <template x-teleport="body">
                    <div x-show="lightboxOpen" x-transition.opacity
                         class="fixed inset-0 z-50 overflow-y-auto bg-black/95"
                         @keydown.escape.window="if (lightboxOpen) closeLightbox()">

                        <!-- Sticky close bar -->
                        <div class="sticky top-0 z-10 flex justify-end px-4 py-3 pointer-events-none bg-gradient-to-b from-black to-transparent">
                            <button @click="closeLightbox()"
                                    :aria-label="$store.lang.t('a11y_close')"
                                    class="text-white transition-colors cursor-pointer pointer-events-auto hover:text-earth-accent">
                                <svg class="w-8 h-8 lg:w-16 lg:h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>

                        <!-- Images column: each image fits within the viewport via
                             max-h:90vh (height becomes the constraint on landscape
                             screens, so 4:3 photos no longer overflow vertically on
                             laptops). The outer 1700px cap is a safety ceiling for
                             ultra-wide monitors. Headers stay inside their own
                             narrower max-w container. -->
                        <div class="pb-16 -mt-14 max-w-[1700px] mx-auto">
                            <template x-for="(item, i) in lightboxItems" :key="i">
                                <div>
                                    <template x-if="item.type === 'header'">
                                        <div class="px-4">
                                            <div class="pb-3 mt-12 mb-6 text-2xl md:text-3xl font-heading text-white border-b border-white/15"
                                                 x-text="item.title"></div>
                                        </div>
                                    </template>
                                    <template x-if="item.type === 'image'">
                                        <div class="mb-3" :data-lb-idx="item.lbId">
                                            <img :src="item.src"
                                                 :srcset="item.srcset || null"
                                                 :sizes="item.srcset ? '100vw' : null"
                                                 :alt="item.alt"
                                                 class="block w-full"
                                                 loading="lazy"
                                                 onerror="this.style.display='none'">
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                    </template>
                  </div>
                </div>

                <!-- INFO CARD — DOM order 3; desktop: col 3, row 1 (sticky alongside text) -->
                <div class="mt-10 lg:col-start-3 lg:row-start-1 lg:mt-0"
                     x-data="scrollReveal(150)"
                     :class="revealed ? 'reveal-visible' : 'reveal-hidden'">
                    <div class="overflow-hidden bg-white border shadow-md rounded-2xl border-earth-pill">

                        <!-- Price header -->
                        <div class="px-6 py-6 text-center text-white bg-earth-accent">
                            <div class="flex items-center justify-center gap-2 mb-2">
                                <img src="images/thai.svg" alt="" class="object-cover w-5 h-5 rounded-full ring-1 ring-white/30">
                                <p class="text-xs font-medium tracking-wider uppercase opacity-90"
                                   x-text="$store.lang.t('info_asking_price')"></p>
                            </div>
                            <p class="text-4xl font-bold leading-tight font-heading md:text-5xl"
                               x-text="$store.lang.t('pill_price')"></p>
                            <div class="flex flex-wrap items-center justify-center pt-3 mt-4 text-sm border-t border-white/20 gap-x-4 gap-y-2 opacity-95">
                                <span class="inline-flex items-center gap-1.5">
                                    <img src="images/usa.svg" alt="" class="object-cover w-4 h-4 rounded-full">
                                    <span x-text="$store.lang.t('info_price_usd')"></span>
                                </span>
                                <span class="text-white/40" aria-hidden="true">·</span>
                                <span class="inline-flex items-center gap-1.5">
                                    <img src="images/euro.svg" alt="" class="object-cover w-4 h-4 rounded-full">
                                    <span x-text="$store.lang.t('info_price_eur')"></span>
                                </span>
                            </div>
                        </div>

                        <!-- Specs list -->
                        <div class="px-6 py-5 space-y-3.5">
                            <div class="flex items-center gap-3 text-lg">
                                <svg class="flex-shrink-0 w-4 h-4 text-earth-accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 22V10l9-8 9 8v12"/><path d="M9 22v-6h6v6"/>
                                </svg>
                                <span class="text-earth-secondary" x-text="$store.lang.t('pill_bedrooms')"></span>
                            </div>
                            <div class="flex items-center gap-3 text-lg">
                                <svg class="flex-shrink-0 w-4 h-4 text-earth-accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
