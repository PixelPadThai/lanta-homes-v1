<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lanta.homes — Coming Soon</title>
    <meta name="description" content="A curated property portal for Koh Lanta, Thailand. Coming soon.">

    <!-- Open Graph -->
    <meta property="og:title" content="lanta.homes — Coming Soon">
    <meta property="og:description" content="A curated property portal for Koh Lanta, Thailand. Coming soon.">
    <meta property="og:type" content="website">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        earth: {
                            bg:          '#FAF6F1',
                            text:        '#3D3229',
                            accent:      '#C4956A',
                            secondary:   '#8B7355',
                            pill:        '#E8DDD3',
                            'pill-text': '#6B5744',
                        }
                    },
                    fontFamily: {
                        heading: ['"Playfair Display"', 'serif'],
                        body:    ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in       { animation: fade-in 0.8s ease-out forwards; }
        .fade-in-delay { animation: fade-in 0.8s ease-out 0.25s forwards; opacity: 0; }
        .fade-in-slow  { animation: fade-in 0.8s ease-out 0.5s forwards;  opacity: 0; }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }
        .dot { animation: pulse-dot 2s ease-in-out infinite; }
        .dot:nth-child(2) { animation-delay: 0.3s; }
        .dot:nth-child(3) { animation-delay: 0.6s; }
    </style>
</head>
<body class="bg-earth-bg text-earth-text font-body min-h-screen flex flex-col items-center justify-center px-6">

    <div class="text-center max-w-lg">

        <!-- Logo / wordmark -->
        <p class="font-heading text-4xl md:text-5xl font-bold tracking-tight fade-in">
            lanta<span class="text-earth-accent">.</span>homes
        </p>

        <!-- Divider -->
        <div class="mt-6 mb-6 flex items-center justify-center gap-1 fade-in-delay">
            <span class="block h-px w-16 bg-earth-pill"></span>
            <span class="block w-1.5 h-1.5 rounded-full bg-earth-accent"></span>
            <span class="block h-px w-16 bg-earth-pill"></span>
        </div>

        <!-- Headline -->
        <h1 class="font-heading text-2xl md:text-3xl font-medium leading-snug fade-in-delay">
            A property portal for Koh Lanta
        </h1>

        <!-- Subtext -->
        <p class="mt-4 text-earth-secondary text-base leading-relaxed fade-in-slow">
            Curated listings, honest descriptions, no noise.<br>
            We're building something worth visiting.
        </p>

        <!-- Coming soon indicator -->
        <div class="mt-10 inline-flex items-center gap-2 bg-earth-pill text-earth-pill-text px-5 py-2.5 rounded-full text-sm font-medium fade-in-slow">
            <span class="dot w-1.5 h-1.5 rounded-full bg-earth-accent inline-block"></span>
            <span class="dot w-1.5 h-1.5 rounded-full bg-earth-accent inline-block"></span>
            <span class="dot w-1.5 h-1.5 rounded-full bg-earth-accent inline-block"></span>
            <span class="ml-1">Launching soon</span>
        </div>

    </div>

    <!-- Footer -->
    <p class="absolute bottom-8 text-earth-secondary/50 text-xs">
        &copy; 2026 lanta.homes
    </p>

</body>
</html>
